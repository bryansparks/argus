name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # WEAKNESS: actions not pinned to a SHA — supply chain risk
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # WEAKNESS: GITHUB_TOKEN exposed unnecessarily broadly
      - name: Install deps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pip install -r requirements.txt

      # WEAKNESS: no dependency vulnerability scanning
      # WEAKNESS: no secret scanning step
      - name: Run tests
        run: pytest
