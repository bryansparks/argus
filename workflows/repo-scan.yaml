name: repo-security-scan
version: "1.0"
description: "Scan a GitHub repository (Python, JS/TS, Java, Rust, Go) for security vulnerabilities and produce a prioritized hardening report."
mission: |
  Produce an actionable, prioritized security report that developers can use
  to remediate vulnerabilities. Focus on findings with clear evidence and
  concrete fixes. Flag false positives. Calibrate severity accurately.

model_tiers:
  tiny:
    provider: openrouter
    model: qwen/qwen-3.2-3b-instruct:free
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.2
    max_tokens: 2048

  small:
    provider: openrouter
    model: qwen/qwen-3.2-3b-instruct:free
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.2
    max_tokens: 4096

  medium:
    provider: openrouter
    model: qwen/qwen-3-235b-a22b-instruct:free
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.2
    max_tokens: 4096

  large:
    provider: openrouter
    model: qwen/qwen-3-235b-a22b-instruct:free
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.2
    max_tokens: 8192

  frontier:
    provider: openrouter
    model: qwen/qwen-3-235b-a22b-instruct:free
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.3
    max_tokens: 8192

  synthesis:
    provider: openrouter
    model: qwen/qwen-3-235b-a22b-instruct:free
    api_key_env: OPENROUTER_API_KEY
    temperature: 0.2
    max_tokens: 8192

role_type_defaults:
  worker: small
  orchestrator: frontier
  judge: large
  researcher: large

contracts:
  inputs:
    - name: repo_url
    - name: clone_url
    - name: run_id
    - name: _false_positive_memory
    - name: _stale_memory_keys

checkpoint: true

continuation:
  carry_forward:
    - key: synthesize_findings.total_count
    - key: synthesize_findings.by_severity
  inject_as: prior_run

triggers:
  - type: cron
    schedule: "0 2 * * 1"    # 2am UTC every Monday
  - type: webhook
    path: /webhook/repo-scan

sandbox:
  mode: docker
  image: python:3.11-slim
  allow_network: true         # scanners fetch vulnerability DB updates
  timeout_s: 600.0
  cpu_limit: "2.0"
  memory_limit: "2g"
  host_workspace: ./argus-workspace

memory:
  enabled: true
  capture:
    - stage: validate_findings
      key: false_positive_ids
      max_entries: 10
  inject_as: _false_positive_memory
  staleness_threshold_days: 14

safety_mode: permissive

safety_rules:
  # Block rules for destructive operations
  - tool: shell
    condition:
      field: cmd
      op: matches_regex
      value: "git\\s+(push|commit|merge|rebase)"
    action: block
    message: "Git write operations are not permitted in scan mode"
  - tool: shell
    condition:
      field: cmd
      op: matches_regex
      value: "rm\\s+-rf"
    action: block
    message: "Destructive rm -rf not permitted"
  - tool: shell
    condition:
      field: cmd
      op: contains
      value: "gh issue"
    action: block
    message: "Issue creation must be done outside the scan workflow"
  # Explicit allow rules for non-shell tools (documents intent, not required in permissive mode)
  - tool: list_source_files
    condition:
      field: repo_dir
      op: truthy
      value: ""
    action: allow
    message: "Source file enumeration allowed"
  - tool: read_file
    condition:
      field: path
      op: truthy
      value: ""
    action: allow
    message: "File read allowed"
  - tool: aggregate_findings
    condition:
      field: per_file_results
      op: truthy
      value: ""
    action: allow
    message: "Finding aggregation allowed"
  - tool: run_all_scanners
    condition:
      field: repo_dir
      op: truthy
      value: ""
    action: allow
    message: "Security scanner suite allowed"
  - tool: normalize_synthesize_output
    condition:
      field: synthesize_findings
      op: truthy
      value: ""
    action: allow
    message: "Output normalization allowed"
  - tool: compress_iso_scanners
    condition:
      field: run_iso_scanners
      op: truthy
      value: ""
    action: allow
    message: "ISO scanner compression allowed"
  - tool: generate_markdown_report
    condition:
      field: run_id
      op: truthy
      value: ""
    action: allow
    message: "Report generation allowed"

tools:
  - module: argus.tools.scanners
  - module: argus.tools.files

adapters:
  clone_repo:
    name: clone_repo
    type: script
    timeout: 180
    cmd: >-
      if [ -d "{{ repo_url }}" ]; then
        cp -r "{{ repo_url }}" "/tmp/argus-{{ run_id }}" 2>&1 && echo 'CLONE_OK (local copy)';
      else
        git clone --depth 1 --single-branch "{{ clone_url }}" "/tmp/argus-{{ run_id }}" 2>&1 && echo 'CLONE_OK';
      fi

  gather_config:
    name: gather_config
    type: script
    cmd: >-
      (echo '=== DOCKER ===';
      find /tmp/argus-{{ run_id }} -name 'Dockerfile*' ! -path '*/.git/*' | head -3 | while read f; do echo "--- $f ---"; head -80 "$f"; done || echo 'none';
      echo '=== COMPOSE ===';
      find /tmp/argus-{{ run_id }} -name 'docker-compose*.yml' ! -path '*/.git/*' | head -2 | while read f; do echo "--- $f ---"; head -100 "$f"; done || echo 'none';
      echo '=== FRAMEWORK_SETTINGS ===';
      find /tmp/argus-{{ run_id }} \( -name 'settings*.py' -o -name 'config*.py' -o -name 'app.py' -o -name 'main.py' \) ! -path '*/.git/*' ! -path '*/venv/*' | head -4 | while read f; do echo "--- $f ---"; head -100 "$f"; done || echo 'none';
      echo '=== ENV_TEMPLATES ===';
      find /tmp/argus-{{ run_id }} -name '.env*' ! -name '.env' ! -path '*/.git/*' | head -3 | while read f; do head -50 "$f"; done 2>/dev/null || echo 'none';
      echo '=== CI_WORKFLOWS ===';
      find /tmp/argus-{{ run_id }}/.github/workflows \( -name '*.yml' -o -name '*.yaml' \) 2>/dev/null | head -8 | while read f; do echo "--- $f ---"; head -100 "$f"; done || echo 'none';
      echo '=== GITLAB_CI ===';
      find /tmp/argus-{{ run_id }} -maxdepth 2 -name '.gitlab-ci.yml' ! -path '*/.git/*' 2>/dev/null | head -2 | while read f; do echo "--- $f ---"; head -120 "$f"; done || echo 'none';
      echo '=== CIRCLECI ===';
      find /tmp/argus-{{ run_id }} -name 'config.yml' -path '*/.circleci/*' 2>/dev/null | head -1 | while read f; do echo "--- $f ---"; head -120 "$f"; done || echo 'none';
      echo '=== JENKINS ===';
      find /tmp/argus-{{ run_id }} -maxdepth 3 -name 'Jenkinsfile*' ! -path '*/.git/*' 2>/dev/null | head -2 | while read f; do echo "--- $f ---"; head -100 "$f"; done || echo 'none';
      echo '=== AZURE_PIPELINES ===';
      find /tmp/argus-{{ run_id }} -maxdepth 2 \( -name 'azure-pipelines*.yml' -o -name 'azure-pipelines*.yaml' \) ! -path '*/.git/*' 2>/dev/null | head -2 | while read f; do echo "--- $f ---"; head -100 "$f"; done || echo 'none';
      echo '=== BITBUCKET_PIPELINES ===';
      if [ -f /tmp/argus-{{ run_id }}/bitbucket-pipelines.yml ]; then head -100 /tmp/argus-{{ run_id }}/bitbucket-pipelines.yml; else echo 'none'; fi;
      echo '=== TRAVIS_CI ===';
      if [ -f /tmp/argus-{{ run_id }}/.travis.yml ]; then head -80 /tmp/argus-{{ run_id }}/.travis.yml; else echo 'none'; fi;
      echo '=== JAVA_BUILD ===';
      find /tmp/argus-{{ run_id }} \( -name 'pom.xml' -o -name 'build.gradle' -o -name 'build.gradle.kts' -o -name 'settings.gradle' \) ! -path '*/.git/*' ! -path '*/target/*' | head -4 | while read f; do echo "--- $f ---"; head -100 "$f"; done || echo 'none';
      echo '=== SPRING_CONFIG ===';
      find /tmp/argus-{{ run_id }} \( -name 'application.properties' -o -name 'application.yml' -o -name 'application-*.properties' -o -name 'application-*.yml' \) ! -path '*/.git/*' ! -path '*/target/*' | head -4 | while read f; do echo "--- $f ---"; head -80 "$f"; done || echo 'none';
      echo '=== JAVA_WEB_XML ===';
      find /tmp/argus-{{ run_id }} \( -name 'web.xml' -o -name 'persistence.xml' -o -name 'beans.xml' -o -name 'security.xml' \) ! -path '*/.git/*' ! -path '*/target/*' | head -3 | while read f; do echo "--- $f ---"; head -80 "$f"; done || echo 'none';
      echo '=== JS_FRAMEWORK_CONFIG ===';
      find /tmp/argus-{{ run_id }} \( -name 'next.config.js' -o -name 'next.config.ts' -o -name 'next.config.mjs' -o -name 'vite.config.ts' -o -name 'vite.config.js' -o -name 'nuxt.config.ts' -o -name 'nuxt.config.js' \) ! -path '*/.git/*' ! -path '*/node_modules/*' | head -4 | while read f; do echo "--- $f ---"; head -80 "$f"; done || echo 'none';
      echo '=== NPM_PACKAGE_JSON ===';
      find /tmp/argus-{{ run_id }} -maxdepth 2 -name 'package.json' ! -path '*/node_modules/*' ! -path '*/.git/*' | head -3 | while read f; do echo "--- $f ---"; head -60 "$f"; done || echo 'none';
      echo '=== CARGO_MANIFEST ===';
      find /tmp/argus-{{ run_id }} \( -name 'Cargo.toml' -o -name 'Cargo.lock' \) ! -path '*/.git/*' ! -path '*/target/*' | head -4 | while read f; do echo "--- $f ---"; head -100 "$f"; done || echo 'none';
      echo '=== GO_MANIFEST ===';
      find /tmp/argus-{{ run_id }} \( -name 'go.mod' -o -name 'go.sum' \) ! -path '*/.git/*' ! -path '*/vendor/*' | head -4 | while read f; do echo "--- $f ---"; head -100 "$f"; done || echo 'none') | head -c 32000

  cleanup:
    name: cleanup
    type: script
    cmd: >-
      python3 -c "
      import shutil, os
      shutil.rmtree('/tmp/argus-{{ run_id }}', ignore_errors=True)
      for f in ['/tmp/argus-{{ run_id }}-leaks.json', '/tmp/argus-{{ run_id }}-grype.json']:
          os.path.exists(f) and os.unlink(f)
      " && echo 'cleanup done'

stages:
  - id: clone_repo
    adapter: clone_repo
    on_fail:
      loop:
        stage: clone_repo
        max: 2

  - id: list_source_files
    tool_call:
      name: list_source_files
      args:
        repo_dir: /tmp/argus-{{ run_id }}
    depends_on: [clone_repo]

  - id: triage_files
    depends_on: [list_source_files]
    skip_if: "{{ list_source_files.total_count <= 60 }}"
    fail_as_value: true
    signature:
      input:
        list_source_files: File manifest with compact_manifest (newline-separated relative paths, security-sorted), repo_dir (absolute path to the cloned repo root), and total_count
    role:
      name: triage_analyst
      type: worker
      model_tier: synthesis
      description: |
        You are a security triage specialist. A repository has {{ list_source_files.total_count }} source files.
        Your job is to select the 60 files most likely to contain security vulnerabilities.

        The file list is in list_source_files.compact_manifest in the context — one relative path per line,
        pre-sorted so the most security-relevant filenames appear first.
        {% if list_source_files.compact_manifest_truncated %}
        NOTE: The manifest was truncated at 3000 entries. Security-relevant files were prioritized
        before truncation, so the most important files appear at the top.
        {% endif %}

        The repository root is: {{ list_source_files.repo_dir }}

        Return ABSOLUTE paths by prepending the repo_dir to each selected relative path,
        separated by "/" (e.g. "{{ list_source_files.repo_dir }}/src/auth.py").

        Prioritize files with these characteristics:
        - Name contains: auth, login, token, api, router, handler, upload, exec, admin, user, session, password, key, secret, crypto, db, database, query, sql, request, response, middleware, permission, role
        - Authentication or authorization logic
        - Database access / ORM / raw queries
        - File I/O, subprocess calls, shell execution
        - Network request handling, HTTP clients
        - Configuration loaders, environment variable access
        - Input parsing, deserialization, serialization

        Deprioritize:
        - Test files (*test*, *spec*, *fixture*)
        - Auto-generated code, migrations, locale files
        - Static assets, documentation
        - Very large files (> 2000 lines) that are likely generated

        Return up to 60 files. If fewer than 60 files exist, return all of them.
    output_mode: guided_json
    output_schema:
      type: object
      required: [selected_files, rationale]
      properties:
        selected_files:
          type: array
          items: {type: string}
        rationale: {type: string}

  - id: analyze_file
    depends_on: [triage_files]
    fan_out: 20
    partition_source: "{{ triage_files.selected_files if not triage_files._skipped else list_source_files.file_paths }}"
    partition_key: file_path
    inject_file_as: file_content
    signature:
      input:
        file_path: Absolute path to the source file being analyzed
        file_content: Full text content of the source file
    role:
      name: file_analyst
      type: worker
      model_tier: synthesis
      description: |
        You are a security code reviewer. Analyze the source file below for security vulnerabilities.
        The file is: {{ file_path }}
        The full file content is in file_content in the context.

        Identify every security vulnerability present. Infer the language from the file extension.
        For each finding, provide: vulnerability type, severity, approximate line number, short title,
        one-sentence description of the risk, and a concrete code-level recommendation.

        INJECTION: SQL injection, command injection (subprocess/os.system/exec), template injection,
        code injection (eval/exec), LDAP injection, XXE.

        BROKEN AUTH / CRYPTO: hardcoded secrets, weak crypto (MD5/SHA1 for passwords, ECB, DES),
        insecure randomness, broken JWT, plaintext password storage, non-constant-time comparison.

        UNSAFE DESERIALIZATION: pickle.loads, yaml.load (not safe_load), marshal, node-serialize,
        Java ObjectInputStream, XStream, Jackson enableDefaultTyping.

        ACCESS CONTROL: missing auth/authz checks, IDOR, CSRF missing, open redirect, SSRF.

        DATA EXPOSURE: sensitive data in logs, stack traces to users, PII unencrypted.

        PATH / MEMORY: path traversal, buffer overflow, use-after-free, double-free, format string.

        JS/TS: dangerouslySetInnerHTML, innerHTML from user data, prototype pollution, eval with user input.

        RUST: unsafe blocks, unwrap() on external input, integer overflow (as casting), allocation overflow
        (Vec::with_capacity with unchecked usize arithmetic), parse-and-allocate without max bound.

        GO: database/sql with fmt.Sprintf, TLS InsecureSkipVerify, math/rand for secrets,
        text/template for HTML, parse-and-allocate with user-controlled size.

        C/C++: strcpy/gets/scanf %s, integer overflow before malloc, use-after-free, double-free,
        printf with user-controlled format string.

        RUBY: SQL injection (string interpolation in ActiveRecord queries), command injection
        (backtick execution, system/exec with user input), mass assignment without strong params,
        insecure deserialization (Marshal.load), hardcoded secrets, unsafe YAML.load,
        open redirect in redirect_to, XSS via html_safe / raw / content_tag without escaping.

        PHP: SQL injection (mysqli/PDO string concat), command injection (exec/system/passthru
        with user input), file inclusion (include/require with user path), unserialize on
        user input, hardcoded credentials, weak crypto (md5/sha1 for passwords), XSS
        (echo $_GET without htmlspecialchars).

        If there are no findings, return an empty vulnerabilities array.
        You MUST return a JSON object. Do NOT return a bare array.
    output_mode: guided_json
    output_schema:
      type: object
      required: [file_path, language, vulnerabilities]
      properties:
        file_path:  {type: string}
        language:   {type: string}
        vulnerabilities:
          type: array
          items:
            type: object
            required: [type, severity, line_approx, title, description, recommendation]
            properties:
              type:           {type: string}
              severity:       {type: string, enum: [critical, high, medium, low]}
              line_approx:    {type: integer}
              title:          {type: string}
              description:    {type: string}
              recommendation: {type: string}

  - id: aggregate_code_findings
    tool_call:
      name: aggregate_findings
      args:
        per_file_results: "{{ analyze_file }}"
    depends_on: [analyze_file]

  - id: gather_config
    adapter: gather_config
    depends_on: [clone_repo]

  - id: run_scanners
    tool_call:
      name: run_all_scanners
      args:
        repo_dir: /tmp/argus-{{ run_id }}
    depends_on: [clone_repo]

  - id: compress_scanners
    depends_on: [run_scanners]
    signature:
      input:
        run_scanners: Raw scanner outputs from all security tools
    role:
      name: scanner_extractor
      type: worker
      model_tier: synthesis
      description: |
        Extract security findings from raw scanner tool output.
        The raw data is in run_scanners in the context. It has 7 keys:
          run_scanners.dependency_scan  — pip-audit + npm-audit output
          run_scanners.supply_chain_scan — CI/CD supply chain checks (GitHub Actions, GitLab CI, CircleCI, Jenkins, Azure Pipelines + unpinned deps)
          run_scanners.secret_scan       — gitleaks secret detection JSON
          run_scanners.grype_scan        — grype CVE scan JSON ({} = no manifests found)
          run_scanners.semgrep_scan      — semgrep (JAVA_SEMGREP, RUST_SEMGREP, PHP_SEMGREP, RUBY_SEMGREP sections)
          run_scanners.gosec_scan        — gosec Go analysis JSON ({} = no Go source)
          run_scanners.cppcheck_scan     — cppcheck C/C++ analysis ("none" = no C/C++ source)
          run_scanners.mobile_scan       — mobsfscan/semgrep Android+iOS analysis ("none" = no mobile source)

        For each scanner key, extract ONLY actual findings. Skip "none", empty results,
        section headers, and boilerplate. Summarize each scanner's real findings as a
        short text string (CVE IDs, secret types, rule names, file:line: message, etc.).
        If a scanner found nothing, write "none".

        Combine semgrep, gosec, cppcheck, and mobile_scan into a single static_analysis_findings string.

        You MUST return a JSON object (not an array) with exactly this structure:
        {"dependency_findings": "...", "supply_chain_findings": "...", "secret_findings": "...", "cve_findings": "...", "static_analysis_findings": "..."}
    output_mode: guided_json
    output_schema:
      type: object
      required: [dependency_findings, supply_chain_findings, secret_findings, cve_findings, static_analysis_findings]
      properties:
        dependency_findings:      { type: string }
        supply_chain_findings:    { type: string }
        secret_findings:          { type: string }
        cve_findings:             { type: string }
        static_analysis_findings: { type: string }

  - id: config_analysis
    depends_on: [gather_config]
    signature:
      input:
        run_id: Scan run identifier
        repo_url: Repository being scanned
        gather_config: Infrastructure and configuration files collected from the repository
    role:
      name: config_analyzer
      type: worker
      model_tier: synthesis
      description: |
        You are a security engineer reviewing infrastructure and framework configuration for vulnerabilities.
        The configuration files to analyze are in gather_config.stdout in the context (sections:
        DOCKER, COMPOSE, FRAMEWORK_SETTINGS, ENV_TEMPLATES, CI_WORKFLOWS, GITLAB_CI, CIRCLECI,
        JENKINS, AZURE_PIPELINES, BITBUCKET_PIPELINES, TRAVIS_CI,
        JAVA_BUILD, SPRING_CONFIG, JAVA_WEB_XML, JS_FRAMEWORK_CONFIG, NPM_PACKAGE_JSON, CARGO_MANIFEST, GO_MANIFEST).
        Do NOT use tools or read files.

        Check for ALL of the following:

        FRAMEWORK MISCONFIGURATION: DEBUG=True in production, ALLOWED_HOSTS=['*'], hardcoded SECRET_KEY,
        missing CSRF middleware, insecure session settings, exposed admin interfaces without IP restriction.

        CORS/HEADERS: allow_origins=["*"] without credentials check, missing security headers
        (HSTS, CSP, X-Frame-Options, X-Content-Type-Options, Referrer-Policy).

        DOCKER SECURITY: running as root (no USER instruction), COPY . . including sensitive files,
        secrets in ENV instructions, latest tag usage, unnecessary exposed ports, --privileged flag.

        CI/CD SECURITY (GitHub Actions): third-party Actions not pinned to SHA, excessive workflow
        permissions (contents: write when not needed), secrets referenced in run: steps that could
        leak to logs, pull_request_target with checkout of untrusted code.

        CI/CD SECURITY (GitLab CI — GITLAB_CI section): base image using :latest tag (no version pin),
        hardcoded credentials in global variables: block, untrusted external include: URLs not pinned
        to a SHA, jobs running with allow_failure:true hiding security step failures.

        CI/CD SECURITY (CircleCI — CIRCLECI section): orbs using @dev: or @volatile channels (unstable,
        can be silently replaced), orbs from unverified publishers, environment variables exposing secrets
        in plain text, using machine executor with image:latest.

        CI/CD SECURITY (Jenkins — JENKINS section): agent any or agent label broadening execution surface,
        withCredentials binding sensitive vars to shell env (leak risk in verbose output), unsanitised
        params.* usage in sh/bat steps (command injection), external shared library without version lock.

        CI/CD SECURITY (Azure Pipelines — AZURE_PIPELINES section): tasks using @latest or floating major
        version (@0, @1) instead of pinned minor version, serviceConnection granting broad permissions,
        variables exposed to untrusted PR branches.

        CI/CD SECURITY (Bitbucket Pipelines — BITBUCKET_PIPELINES section): image using :latest,
        hardcoded credentials in variables: section, deployment environments with unrestricted access.

        CI/CD SECURITY (Travis CI — TRAVIS_CI section): global env containing secrets in plain text,
        before_install running curl|bash pipe installs (supply chain risk).

        ENVIRONMENT: .env.example revealing sensitive variable names, plaintext credentials in
        docker-compose env sections, missing secret management (should use Vault/SSM/Secrets Manager).

        JAVA/SPRING CONFIGURATION: Spring Boot actuator endpoints exposed without authentication
        (management.endpoints.web.exposure.include=*), spring.security.enabled=false or
        security.basic.enabled=false, hardcoded datasource passwords in application.properties,
        spring.jpa.show-sql=true in production, server.error.include-stacktrace=always,
        spring.devtools.remote.secret set (enables remote debugging), debug=true in Spring Boot,
        H2 console enabled in production (spring.h2.console.enabled=true).

        JAVA WEB.XML: missing HttpOnly/Secure cookie flags in session-config, weak session timeout,
        missing security-constraint elements, HTTP methods not restricted, missing transport-guarantee
        CONFIDENTIAL for sensitive URLs, default error pages exposing stack traces.

        JAVASCRIPT FRAMEWORK CONFIGURATION: Next.js — dangerouslyAllowSVG without contentDispositionType,
        images.domains or remotePatterns allowing wildcard hosts, headers() missing X-Frame-Options/CSP,
        rewrites() proxying to user-controlled destinations, i18n locales without locale detection
        safeguards; Vite — server.cors:true in production builds, base set to user-controllable value,
        define exposing secrets (process.env.SECRET_KEY baked into bundle);
        General package.json — scripts running curl|bash or piping to sh (supply chain risk),
        dependencies on packages with no lock file (floating versions without lock = reproducibility risk).

        You MUST return a JSON object (not an array) with exactly this structure:
        {"vulnerabilities": [...], "files_reviewed": <integer>}
        Do NOT return a bare array. The top-level value must be a JSON object {}.
    output_mode: guided_json
    output_schema:
      type: object
      required: [vulnerabilities, files_reviewed]
      properties:
        vulnerabilities:
          type: array
          items:
            type: object
            required: [file, line_approx, severity, type, description, recommendation]
            properties:
              file:           { type: string }
              line_approx:    { type: integer }
              severity:       { type: string, enum: [critical, high, medium, low] }
              type:           { type: string }
              description:    { type: string }
              recommendation: { type: string }
        files_reviewed: { type: integer }
    on_fail:
      loop:
        stage: config_analysis
        max: 2

  - id: synthesize_findings
    depends_on: [aggregate_code_findings, config_analysis, compress_scanners]
    signature:
      input:
        run_id: Scan run identifier
        repo_url: Repository being scanned
        aggregate_code_findings: Fan-out code vulnerability analysis — merged per-file findings (JSON)
        config_analysis: LLM infrastructure and config analysis (JSON)
        compress_scanners: Extracted scanner findings (dependency, supply_chain, secrets, CVEs, static analysis)
    role:
      name: synthesizer
      type: orchestrator
      model_tier: synthesis
      description: |
        You are combining security findings from seven sources into a unified list.
        All source data is in the context provided with this message. Do NOT use tools.

        The seven sources are:
          SOURCE 1 — aggregate_code_findings               (per-file LLM code analysis, JSON — use .vulnerabilities array;
                     if .truncation_note is non-empty, note that lower-severity findings were capped to prevent context overflow)
          SOURCE 2 — config_analysis                       (LLM infrastructure/config analysis, JSON)
          SOURCE 3 — compress_scanners.dependency_findings  (pip-audit + npm-audit findings)
          SOURCE 4 — compress_scanners.supply_chain_findings (CI/CD supply chain findings: GitHub Actions, GitLab CI, CircleCI, Jenkins, Azure Pipelines, unpinned deps)
          SOURCE 5 — compress_scanners.secret_findings      (gitleaks secret detection findings)
          SOURCE 6 — compress_scanners.cve_findings         (grype CVE scan findings)
          SOURCE 7 — compress_scanners.static_analysis_findings (semgrep [Java/Rust/PHP/Ruby] + gosec + cppcheck + mobile_scan static analysis)

        Read all seven sources and combine them into a single deduplicated list.
        Assign each finding a unique ID (F001, F002, ...).
        Classify source as: code_analysis | config | dependency | supply_chain | secrets.
        Map grype findings to source=dependency. Map semgrep, gosec, and cppcheck to source=code_analysis.
        Do not invent findings not present in the sources.

        DEDUPLICATION RULES — apply before emitting any finding:
        1. Same file + same vulnerability class (e.g. "unpinned action", "SQL injection", "hardcoded secret"):
           emit ONE finding, not one per source. Use the richer description of the two.
        2. Supply chain scanner and config_analysis often both flag unpinned GitHub Actions on the same
           file/line — merge into a single finding with source=supply_chain.
        3. gitleaks and code_analysis may both flag the same hardcoded secret — merge, source=secrets.
        4. Two dependency findings for the same CVE ID or package — merge into one, source=dependency.
        5. When merging, prefer the description from the source with the most detail (line number,
           code snippet, or CVE ID). Keep the higher of the two severity ratings.
    output_mode: guided_json
    output_schema:
      type: object
      required: [findings, total_count, by_severity]
      properties:
        findings:
          type: array
          items:
            type: object
            required: [id, source, severity, title, description, recommendation]
            properties:
              id:             { type: string }
              source:         { type: string, enum: [code_analysis, config, dependency, supply_chain, secrets] }
              severity:       { type: string, enum: [critical, high, medium, low] }
              title:          { type: string }
              file:           { type: string }
              line_approx:    { type: integer }
              description:    { type: string }
              recommendation: { type: string }
        total_count: { type: integer }
        by_severity:
          type: object
          properties:
            critical: { type: integer }
            high:     { type: integer }
            medium:   { type: integer }
            low:      { type: integer }

  - id: prioritize_tasks
    depends_on: [synthesize_findings]
    signature:
      input:
        run_id: Scan run identifier
        synthesize_findings: Unified deduplicated findings list to prioritize
    role:
      name: prioritizer
      type: orchestrator
      model_tier: synthesis
      description: |
        You are a security engineer creating a prioritized remediation plan.
        The unified findings list is in synthesize_findings in the context.

        Rank all findings by: (1) severity, (2) exploitability, (3) ease of fix.
        Assign effort as low (< 1 hour), medium (1-4 hours), or high (> 4 hours).
        The highest-priority item should be the one that is most critical AND easiest to fix.
    output_mode: guided_json
    output_schema:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            type: object
            required: [priority, finding_id, title, severity, effort, rationale]
            properties:
              priority:   { type: integer }
              finding_id: { type: string }
              title:      { type: string }
              severity:   { type: string }
              effort:     { type: string, enum: [low, medium, high] }
              rationale:  { type: string }

  - id: validate_findings
    depends_on: [prioritize_tasks]
    signature:
      input:
        run_id: Scan run identifier
        prioritize_tasks: Prioritized remediation task list to validate
        synthesize_findings: Original findings for cross-reference
        _false_positive_memory: False positive patterns identified in prior scans (rolling history)
        _stale_memory_keys: Stale memory warnings (if any)
    role:
      name: validator
      type: judge
      model_tier: synthesis
      description: |
        You are a senior security engineer performing a final review before this report is shown to a human.

        Review the prioritized findings and check for:
        - False positives (flag any finding that is clearly not a real vulnerability)
        - Misclassified severity (flag anything that should be higher or lower)
        - Priority ordering errors (flag if the order seems wrong)

        The prioritized tasks are in prioritize_tasks in the context.
        The original findings are in synthesize_findings in the context.
        Prior false positive patterns are in _false_positive_memory (use as soft signal — not a blocklist).

        {% if _stale_memory_keys %}
        WARNING: The following memory entries may be outdated: {{ _stale_memory_keys | join(", ") }}
        Weight these older false positive patterns lower in your analysis.
        {% endif %}

        If there are no significant issues, set accept=true with confidence >= 0.8.
        If false positives are found, list them by finding_id.
    output_mode: guided_json
    output_schema:
      type: object
      required: [accept, confidence, false_positive_ids, notes, feedback]
      properties:
        accept:             { type: boolean }
        confidence:         { type: number }
        false_positive_ids: { type: array, items: { type: string } }
        notes:              { type: string }
        feedback:           { type: string }
    on_fail:
      loop:
        stage: validate_findings
        max: 2

  - id: generate_report
    depends_on: [validate_findings]
    signature:
      input:
        run_id: Scan run identifier
        repo_url: Repository being scanned
        validate_findings: Validator review with confidence score and false positive flags
        prioritize_tasks: Prioritized remediation task list
        synthesize_findings: Full findings with descriptions and recommendations
        prior_run: "Summary from previous scan run with keys total_count and by_severity — absent on first run"
    role:
      name: reporter
      type: worker
      model_tier: synthesis
      description: |
        IMPORTANT: You have NO access to tools, shell commands, or file systems. Do NOT attempt to read files or use any tools. All data required to write this report is already provided below.

        Generate a detailed, actionable Markdown security report rendered with rich formatting.
        The report must be specific enough that a developer can make the exact fix without looking at the source code.

        FORMATTING RULES — follow these exactly:
        - Use these emoji severity badges in ALL places where severity appears (table cells, headings, lists):
            🔴 Critical   🟠 High   🟡 Medium   🟢 Low
        - Use GitHub-flavored callout syntax for key warnings in the Executive Summary:
            > [!CAUTION]
            > (text for critical/high severity items that need immediate attention)
        - In the Risk Summary table, the Severity column must contain the emoji badge: e.g. `🔴 Critical`
        - In Detailed Findings headings, include the emoji: e.g. `#### [F001] SQL Injection (🔴 Critical)`

        ACCURACY RULES — never violate these:
        - Do NOT invent or guess commit SHAs for GitHub Actions. Use the placeholder
          `<COMMIT-SHA>` and add a comment showing the gh CLI command to resolve it:
          `# gh api repos/actions/checkout/git/ref/tags/v4 --jq .object.sha`
        - Do NOT fabricate CVE numbers, version numbers, or line numbers not present in the findings data.
        - Code snippets in the Fix blocks must match exactly what the findings data says; do not paraphrase or reconstruct from memory.

        Repository scanned: {{ repo_url }}
        Run ID: {{ run_id }}

        Exclude these finding IDs (false positives): {{ validate_findings.false_positive_ids }}
        Validator confidence: {{ validate_findings.confidence }}

        The prioritized tasks are in prioritize_tasks in the context.
        The synthesized findings detail is in synthesize_findings in the context.

        Structure the Markdown report as follows:

        ## Security Scan Report

        ### Executive Summary

        3-5 sentences: what repo was scanned, total findings by severity (use emoji badges inline,
        e.g. "2 🔴 Critical, 3 🟠 High"), the single highest-priority item and why.

        {% if prior_run is defined and prior_run %}
        Include a one-sentence trend comparison: "This run found {{ synthesize_findings.total_count }} issues
        versus {{ prior_run.total_count }} in the prior scan
        ({{ '+' if synthesize_findings.total_count > prior_run.total_count else '' }}{{ synthesize_findings.total_count - prior_run.total_count }} net change)."
        {% endif %}

        If any Critical or High findings exist, add a callout block:
        > [!CAUTION]
        > (one sentence naming the most urgent issue and its immediate risk)

        ### Risk Summary

        A table with columns: Priority | ID | Title | File | Lines | Severity | Source | Effort
        — Severity column values must use emoji badges: 🔴 Critical / 🟠 High / 🟡 Medium / 🟢 Low

        ### Prioritized Remediation Tasks

        Numbered list matching the prioritize_tasks order. For each:
        - **[Priority N] Title** (🔴 Critical · low effort)
          - File: `path/to/file.py`, lines X–Y
          - One sentence on why this is the priority ranking.

        ### Detailed Findings

        One subsection per finding (in priority order). For each finding use this exact structure:

        #### [ID] Title (🔴 Critical)

        **File:** `relative/path/to/file.py`, line(s) N–M
        **Source:** code_analysis | config | dependency | supply_chain | secrets
        **Concern:** Clear description of the vulnerability and what an attacker could do with it.

        **Vulnerable code:**
        ```python
        # exact lines from the source showing the problem
        ```

        **Fix:**
        ```python
        # the corrected code that replaces the vulnerable lines above
        ```

        **Why this fix works:** One sentence explaining the security principle.

        ---

        ### Scan Coverage

        List every vulnerability category and tool checked, organized by section.
        Use ✓ checkmarks for all items.

        **Source Code Analysis** (Python + JavaScript/TypeScript + Java + Rust + Go + Ruby + PHP)
        ✓ SQL injection · ✓ Command injection (subprocess shell=True, os.system, os/exec, Command) · ✓ LDAP injection
        ✓ Template injection (Jinja2, Django, Handlebars, Thymeleaf) · ✓ Code injection (eval/exec/compile)
        ✓ XXE (XML External Entity) · ✓ Hardcoded secrets and credentials
        ✓ Weak cryptography (MD5/SHA1 for passwords, ECB mode, DES) · ✓ Insecure randomness (random vs secrets/crypto/rand)
        ✓ Non-constant-time comparisons · ✓ Broken JWT (alg:none, weak secret)
        ✓ Unsafe deserialization (pickle, yaml.load, marshal, node deserialize, ObjectInputStream)
        ✓ Missing authentication/authorization · ✓ Insecure direct object references (IDOR)
        ✓ CSRF missing on state-changing endpoints · ✓ Open redirect · ✓ SSRF
        ✓ Sensitive data in logs · ✓ Path traversal · ✓ ReDoS (user-controlled regex)
        ✓ Race conditions in file operations · ✓ Prototype pollution (JS)
        ✓ Rust unsafe blocks / memory unsafety · ✓ Rust unwrap() panic on external input
        ✓ Rust integer overflow via as casting · ✓ Go InsecureSkipVerify TLS · ✓ Go text/template XSS
        ✓ Go goroutine race conditions · ✓ Go unsafe.Pointer usage
        ✓ Ruby SQL injection (ActiveRecord string interpolation) · ✓ Ruby mass assignment · ✓ Ruby open redirect
        ✓ PHP SQL injection · ✓ PHP file inclusion · ✓ PHP command injection · ✓ PHP unserialize

        **Mobile Application Analysis** (Android + iOS — when source present)
        ✓ Android: hardcoded secrets, insecure data storage, exported components, weak crypto
        ✓ Android: intent injection, SQL injection in content providers, WebView JS bridge
        ✓ iOS: insecure keychain usage, ATS disabled, hardcoded keys, weak NSURLSession config

        **Infrastructure & Configuration Analysis**
        ✓ Framework misconfiguration (DEBUG mode, ALLOWED_HOSTS, SECRET_KEY)
        ✓ CORS policy (allow_origins=*) · ✓ Missing security headers (HSTS, CSP, X-Frame-Options)
        ✓ Docker security (root user, COPY . ., secrets in ENV, latest tag, exposed ports)
        ✓ CI/CD security (unpinned actions, excessive permissions, secret leakage in run steps)
        ✓ Environment configuration (plaintext credentials, missing secret management)

        **Dependency Scanning** (pip-audit + npm/pnpm audit + grype)
        ✓ Known CVEs in Python dependencies · ✓ Known CVEs in JavaScript/Node.js dependencies
        ✓ Known CVEs in Java/Maven/Gradle dependencies (grype) · ✓ Known CVEs in Rust crates (grype + Cargo.lock)
        ✓ Known CVEs in Go modules (grype + go.sum) · ✓ Unpinned dependency versions
        ✓ Manifest inventory (requirements.txt, pyproject.toml, package.json, Cargo.toml, go.mod)

        **Go Static Analysis** (gosec)
        ✓ SQL injection (database/sql string formatting) · ✓ Command injection (os/exec with user args)
        ✓ SSRF (http.Get with user-controlled URL) · ✓ TLS InsecureSkipVerify
        ✓ Weak randomness (math/rand for secrets) · ✓ File path traversal · ✓ Unsafe package usage
        ✓ Hardcoded credentials · ✓ Integer overflow · ✓ Goroutine race conditions
        ✓ Parse-and-allocate size overflow (make with user-controlled size)

        **Rust Static Analysis** (semgrep p/rust)
        ✓ unsafe {} blocks (memory unsafety, raw pointer dereference) · ✓ std::mem::transmute
        ✓ Allocation overflow (Vec::with_capacity / reserve with unchecked usize arithmetic)
        ✓ Parse-and-allocate without maximum size validation

        **C/C++ Static Analysis** (cppcheck)
        ✓ Out-of-bounds read/write · ✓ Use-after-free · ✓ Null pointer dereference
        ✓ Memory leak · ✓ Buffer overflow (stack and heap) · ✓ Integer overflow
        ✓ Uninitialized variable · ✓ Double free · ✓ Invalid iterator usage

        **Supply Chain Analysis**
        ✓ GitHub Actions not pinned to SHA · ✓ Excessive workflow permissions
        ✓ Script injection via untrusted PR event refs · ✓ Secrets echoed in run steps
        ✓ Unpinned Python dependencies

        **Secret Detection** (gitleaks)
        ✓ API keys and tokens (AWS, GCP, GitHub, Slack, etc.) · ✓ Private keys (SSH, RSA, PGP)
        ✓ Database connection strings · ✓ JWT tokens · ✓ Generic high-entropy strings

        ### Scan Metadata
        - Run ID: {{ run_id }}
        - Repository: {{ repo_url }}
        - Stages: clone_repo, list_source_files, triage_files, analyze_file (fan-out), aggregate_code_findings, gather_config, run_scanners, compress_scanners, config_analysis, synthesize_findings, prioritize_tasks, validate_findings, generate_report
        - Validator confidence: {{ validate_findings.confidence }}
        {% if prior_run is defined and prior_run %}- Prior scan: {{ prior_run.total_count }} total findings ({{ prior_run.by_severity.critical | default(0) }} critical, {{ prior_run.by_severity.high | default(0) }} high){% endif %}

        Put the complete Markdown report text into the "report" field of the JSON response.
        Start the report with the `## Security Scan Report` heading and end after the Scan Metadata section.
        Do NOT add code fences around the report content inside the JSON string.
    output_mode: guided_json
    output_schema:
      type: object
      required: [report]
      properties:
        report: { type: string }

  - id: cleanup
    adapter: cleanup
    depends_on: [generate_report]

  # Post-run self-analysis: reviews the completed run transcript and suggests improvements
  - id: self_analyst
    post_run: true
    signature:
      input:
        _transcript: Full run transcript (filtered to key stages)
        _diagnostics: Run failure signatures and error types
        synthesize_findings.total_count: Total findings count
        validate_findings.confidence: Validator confidence score
        run_scanners: Raw scanner output summary
    role:
      name: Self-Analyst
      type: judge
      model_tier: frontier
      description: |
        You are reviewing a completed Argus security scan run to identify quality improvements.

        The filtered run transcript is in _transcript in the context.
        Run diagnostics (failure signatures, error types) are in _diagnostics in the context.

        Your task:
        1. Review each LLM stage's output quality from the transcript
        2. Identify stages that produced weak, vague, or potentially incorrect output
        3. Check for patterns: repeated retries, escalation to higher tiers, schema validation failures
        4. Suggest concrete spec improvements for the next run

        Focus on:
        - Stages where the model seemed to struggle (long thinking, multiple attempts)
        - Findings that may be false positives (vague descriptions, missing code snippets)
        - Security scanner output that was not fully utilized
        - Prompt sections that could be more specific or actionable

        Return a JSON object with:
        - "issues": array of strings describing quality issues found
        - "suggestions": array of concrete spec improvement recommendations
        - "confidence": 0.0-1.0 score for how confident you are in this analysis
        - "stages_flagged": list of stage ids that need attention
    output_mode: guided_json
    output_schema:
      type: object
      required: [issues, suggestions, confidence, stages_flagged]
      properties:
        issues:
          type: array
          items: { type: string }
        suggestions:
          type: array
          items: { type: string }
        confidence: { type: number, minimum: 0.0, maximum: 1.0 }
        stages_flagged:
          type: array
          items: { type: string }
    depends_on: []
