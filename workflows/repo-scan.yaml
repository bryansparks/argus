name: repo-security-scan
version: "1.0"
description: "Scan a Python GitHub repository for security vulnerabilities and produce a prioritized hardening report."

model_tiers:
  frontier:
    provider: anthropic
    model: claude-opus-4-7

safety_rules:
  - tool: shell
    condition:
      field: cmd
      op: matches_regex
      value: "git\\s+(push|commit|merge|rebase)"
    action: block
    message: "Git write operations are not permitted in scan mode"
  - tool: shell
    condition:
      field: cmd
      op: matches_regex
      value: "rm\\s+-rf"
    action: block
    message: "Destructive rm -rf not permitted"
  - tool: shell
    condition:
      field: cmd
      op: contains
      value: "gh issue"
    action: block
    message: "Issue creation must be done outside the scan workflow"

adapters:
  clone_repo:
    name: clone_repo
    type: script
    cmd: >-
      if [ -d "{{ repo_url }}" ]; then
        cp -r "{{ repo_url }}" "/tmp/argus-{{ run_id }}" 2>&1 && echo 'CLONE_OK (local copy)';
      else
        git clone --depth 1 "{{ repo_url }}" "/tmp/argus-{{ run_id }}" 2>&1 && echo 'CLONE_OK';
      fi

  gather_code:
    name: gather_code
    type: script
    cmd: >-
      echo '=== PYTHON_FILES ===';
      find /tmp/argus-{{ run_id }} -name '*.py' ! -path '*/.git/*' ! -path '*/venv/*' ! -path '*/.venv/*' | sort | head -20 | while read f; do echo "--- $f ---"; head -150 "$f"; done;
      echo '=== REQUIREMENTS ===';
      find /tmp/argus-{{ run_id }} -maxdepth 2 -name 'requirements*.txt' | head -3 | xargs cat 2>/dev/null || echo 'none';
      echo '=== CI_CONFIG ===';
      find /tmp/argus-{{ run_id }}/.github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null | xargs cat 2>/dev/null || echo 'none'

  dependency_scan:
    name: dependency_scan
    type: script
    cmd: >-
      cd /tmp/argus-{{ run_id }} &&
      pip-audit --format json -r requirements.txt 2>/dev/null ||
      echo '[]'

  secret_scan:
    name: secret_scan
    type: script
    cmd: >-
      gitleaks detect
      --source /tmp/argus-{{ run_id }}
      --report-format json
      --report-path /tmp/argus-{{ run_id }}-leaks.json
      --no-git 2>/dev/null;
      cat /tmp/argus-{{ run_id }}-leaks.json 2>/dev/null || echo '[]'

stages:
  - id: clone_repo
    adapter: clone_repo
    on_fail:
      loop:
        stage: clone_repo
        max: 2

  - id: gather_code
    adapter: gather_code
    depends_on: [clone_repo]

  - id: dependency_scan
    adapter: dependency_scan
    depends_on: [clone_repo]

  - id: secret_scan
    adapter: secret_scan
    depends_on: [clone_repo]

  - id: code_analysis
    depends_on: [gather_code]
    role:
      name: code_analyzer
      type: worker
      model_tier: frontier
      description: |
        You are a security engineer reviewing Python source code for vulnerabilities.

        Analyze the following source code and identify security issues.
        Focus on: SQL injection, command injection, hardcoded secrets, weak cryptography,
        insecure deserialization, path traversal, XSS, insecure direct object references,
        and missing authentication/authorization checks.

        Source code:
        {{ gather_code.stdout }}

        For each vulnerability found, provide the file name, approximate line number,
        severity (critical/high/medium/low), vulnerability type, a clear description,
        and a specific recommendation to fix it.
    output_mode: guided_json
    output_schema:
      type: object
      required: [vulnerabilities, files_reviewed]
      properties:
        vulnerabilities:
          type: array
          items:
            type: object
            required: [file, line_approx, severity, type, description, recommendation]
            properties:
              file:        { type: string }
              line_approx: { type: integer }
              severity:    { type: string, enum: [critical, high, medium, low] }
              type:        { type: string }
              description: { type: string }
              recommendation: { type: string }
        files_reviewed: { type: integer }
    on_fail:
      loop:
        stage: code_analysis
        max: 2

  - id: synthesize_findings
    depends_on: [code_analysis, dependency_scan, secret_scan]
    role:
      name: synthesizer
      type: orchestrator
      model_tier: frontier
      description: |
        You are combining security findings from three sources into a unified list.

        SOURCE 1 -- LLM code analysis findings (JSON):
        {{ code_analysis }}

        SOURCE 2 -- pip-audit dependency vulnerability scan (JSON stdout):
        {{ dependency_scan.stdout }}

        SOURCE 3 -- gitleaks secret scan (JSON stdout):
        {{ secret_scan.stdout }}

        Combine all findings into a single deduplicated list. Assign each finding a unique ID
        (F001, F002, ...). Classify the source as: code_analysis | dependency | secrets | ci.
        Do not invent findings not present in the sources above.
    output_mode: guided_json
    output_schema:
      type: object
      required: [findings, total_count, by_severity]
      properties:
        findings:
          type: array
          items:
            type: object
            required: [id, source, severity, title, description, recommendation]
            properties:
              id:             { type: string }
              source:         { type: string, enum: [code_analysis, dependency, secrets, ci] }
              severity:       { type: string, enum: [critical, high, medium, low] }
              title:          { type: string }
              file:           { type: string }
              line_approx:    { type: integer }
              description:    { type: string }
              recommendation: { type: string }
        total_count: { type: integer }
        by_severity:
          type: object
          properties:
            critical: { type: integer }
            high:     { type: integer }
            medium:   { type: integer }
            low:      { type: integer }

  - id: prioritize_tasks
    depends_on: [synthesize_findings]
    role:
      name: prioritizer
      type: orchestrator
      model_tier: frontier
      description: |
        You are a security engineer creating a prioritized remediation plan.

        Findings to prioritize (JSON):
        {{ synthesize_findings }}

        Rank all findings by: (1) severity, (2) exploitability, (3) ease of fix.
        Assign effort as low (< 1 hour), medium (1-4 hours), or high (> 4 hours).
        The highest-priority item should be the one that is most critical AND easiest to fix.
    output_mode: guided_json
    output_schema:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items:
            type: object
            required: [priority, finding_id, title, severity, effort, rationale]
            properties:
              priority:   { type: integer }
              finding_id: { type: string }
              title:      { type: string }
              severity:   { type: string }
              effort:     { type: string, enum: [low, medium, high] }
              rationale:  { type: string }

  - id: validate_findings
    depends_on: [prioritize_tasks]
    role:
      name: validator
      type: judge
      model_tier: frontier
      description: |
        You are a senior security engineer performing a final review before this report is shown to a human.

        Review the prioritized findings and check for:
        - False positives (flag any finding that is clearly not a real vulnerability)
        - Misclassified severity (flag anything that should be higher or lower)
        - Priority ordering errors (flag if the order seems wrong)

        Prioritized tasks (JSON):
        {{ prioritize_tasks }}

        Original findings (JSON):
        {{ synthesize_findings }}

        If there are no significant issues, set accept=true with confidence >= 0.8.
        If false positives are found, list them by finding_id.
    output_mode: guided_json
    output_schema:
      type: object
      required: [accept, confidence, false_positive_ids, notes, feedback]
      properties:
        accept:             { type: boolean }
        confidence:         { type: number }
        false_positive_ids: { type: array, items: { type: string } }
        notes:              { type: string }
        feedback:           { type: string }
    on_fail:
      loop:
        stage: validate_findings
        max: 2

  - id: human_approval
    gate: human
    depends_on: [validate_findings]

  - id: generate_report
    depends_on: [human_approval]
    role:
      name: reporter
      type: worker
      model_tier: frontier
      description: |
        Generate a detailed, actionable Markdown security report. The report must be specific enough that a developer can make the exact fix without looking at the source code.

        Repository scanned: {{ repo_url }}
        Run ID: {{ run_id }}

        Validated findings (JSON):
        {{ validate_findings }}

        Prioritized tasks (JSON):
        {{ prioritize_tasks }}

        Synthesized findings (JSON):
        {{ synthesize_findings }}

        Code that was analyzed:
        {{ gather_code.stdout }}

        Do not include any finding whose id appears in validate_findings.false_positive_ids.

        Structure the Markdown report as follows:

        ## Security Scan Report

        ### Executive Summary
        3-5 sentences: what repo was scanned, total findings by severity, the single highest-priority item to fix first and why.

        ### Risk Summary

        A table with columns: Priority | ID | Title | File | Lines | Severity | Source | Effort

        ### Prioritized Remediation Tasks

        Numbered list matching the prioritize_tasks order. For each:
        - **[Priority N] Title** (Severity, Effort)
          - File: `path/to/file.py`, lines X–Y
          - One sentence on why this is the priority ranking.

        ### Detailed Findings

        One subsection per finding (in priority order). For each finding use this exact structure:

        #### [ID] Title (Severity)

        **File:** `relative/path/to/file.py`, line(s) N–M
        **Source:** code_analysis | dependency | secrets | ci
        **Concern:** Clear description of the vulnerability and what an attacker could do with it.

        **Vulnerable code:**
        ```python
        # exact lines from the source showing the problem
        ```

        **Fix:**
        ```python
        # the corrected code that replaces the vulnerable lines above
        ```

        **Why this fix works:** One sentence explaining the security principle.

        ---

        ### Scan Metadata
        - Run ID: {{ run_id }}
        - Repository: {{ repo_url }}
        - Stages: clone_repo, gather_code, dependency_scan, secret_scan, code_analysis, synthesize_findings, prioritize_tasks, validate_findings, generate_report

        In addition to report_markdown, populate the `fixes` array with one entry per finding.
        IMPORTANT: exclude any finding whose id appears in validate_findings.false_positive_ids from BOTH the Markdown report and the fixes array.
        Each entry must have:
        - finding_id: the F00N id
        - file: path relative to repo root (e.g. "app.py" not "/tmp/argus-.../app.py")
        - line_start and line_end: the line numbers of the vulnerable code. Use 0 if the exact line cannot be determined.
        - title: short finding title
        - vulnerable_code: the exact vulnerable lines as a string
        - fixed_code: the exact replacement lines as a string
        - explanation: one sentence on what the fix does

        Use the gather_code.stdout source to find the actual vulnerable lines and their line numbers.
    output_mode: guided_json
    output_schema:
      type: object
      required: [report_markdown, fixes]
      properties:
        report_markdown:
          type: string
        fixes:
          type: array
          items:
            type: object
            required: [finding_id, file, line_start, line_end, title, vulnerable_code, fixed_code, explanation]
            properties:
              finding_id:      { type: string }
              file:            { type: string }
              line_start:      { type: integer, minimum: 0 }
              line_end:        { type: integer, minimum: 0 }
              title:           { type: string }
              vulnerable_code: { type: string }
              fixed_code:      { type: string }
              explanation:     { type: string }
